<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <h2>🌾 Farmer Market</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    </nav>

<h2 class="title">🌿 Fresh Farm Products</h2>

<div class="products">

    <!-- APPLES -->
    <div class="card">
        <span class="badge">Organic</span>
        <img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce">
        <h3>Fresh Apples</h3>
        <p class="rating">⭐⭐⭐⭐☆</p>
        <p class="price">₹120/kg</p>
        <button onclick="addToCart('Apples',120)">Add to Cart</button>
    </div>

    <!-- TOMATO -->
    <div class="card">
        <span class="badge">Fresh</span>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQL0MBZvjb3WCfx7YZEoCn3Rj32FzNpAHsdI7w0yuQRca6A6dzKWPb3ANy_-DFCNDY1tC8VFw&s">
        <h3>Tomato</h3>
        <p class="rating">⭐⭐⭐⭐⭐</p>
        <p class="price">₹40/kg</p>
        <button onclick="addToCart('Tomato',40)">Add to Cart</button>
    </div>

    <!-- CARROT -->
    <div class="card">
        <span class="badge">Organic</span>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSR6GgYwAhAvOCScxZZhAEuNf72aKaRynstPlnReeuhZJY7esy7CiLjrpkz9FPARJh2ewEsrdVRzZKz-jhGW9ZD71zqfja16sj-MpWlew&s=10">

        <button onclick="addToCart('Carrot',50)">Add to Cart</button>
    </div>

    <!-- MILK -->
    <div class="card">
        <span class="badge">Farm Fresh</span>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTNnN7vuO5uCyt_znNoAUA2osbOwRDtIJAXIA&s">
        <h3>Mango</h3>

        <button onclick="addToCart('Mango',60)">Add to Cart</button>
    </div>

    <!-- WHEAT -->
    <div class="card">
        <span class="badge">Healthy</span>
        <img src="https://m.media-amazon.com/images/I/5195skfRs+L._AC_UF1000,1000_QL80_.jpg">

    <!-- POTATO -->
    <div class="card">
        <span class="badge">Fresh</span>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR1hyLmBOdkNwILGTv3fAHKYk05fKBHTE61dg&s">
        <h3>Potato</h3>
        <p class="rating">⭐⭐⭐⭐☆</p>

        <button onclick="addToCart('Potato',25)">Add to Cart</button>
